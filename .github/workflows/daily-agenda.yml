name: Sakuragi Bot - Daily Agenda

on:
  schedule:
    # GitHub Actions の cron は UTC。22:05 UTC は JST 7:05。
    - cron: "5 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FAILURE_DISCORD_WEBHOOK_URL: ${{ secrets.FAILURE_DISCORD_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:coverage

      - name: Add coverage summary
        if: always()
        run: npm run coverage:summary

      - run: npm start
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Discord on failure
        if: ${{ failure() && env.FAILURE_DISCORD_WEBHOOK_URL != '' }}
        run: |
          payload='{"content":"[Daily Agenda] 実行に失敗しました。GitHub Actionsログを確認してください。"}'
          curl --fail --show-error --silent -H "Content-Type: application/json" -X POST -d "$payload" "$FAILURE_DISCORD_WEBHOOK_URL"
