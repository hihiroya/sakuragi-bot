version: 2
updates:
  # GitHub Actions の checkout/setup-node などを定期更新する。
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"

  # TypeScript、Vitest、Google APIs、Winston などの npm 依存を定期更新する。
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "npm"
    open-pull-requests-limit: 5
